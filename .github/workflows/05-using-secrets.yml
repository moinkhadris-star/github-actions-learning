name: 05 - Using Secrets

on:
  workflow_dispatch:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret (SAFE - won't show in logs)
        env:
          secret_token: ${{ secrets.MY_SECRET_TOKEN }}
        run: |
          echo "Secret is set"
          echo "Length: ${secret_token}"

      - name: Conditional based on secret
        if: ${{secrets.MY_SECRET_TOKEN != ''}}
        run: echo "Secret exists!"