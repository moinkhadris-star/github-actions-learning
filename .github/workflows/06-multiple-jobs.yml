name: 06 - Multiple Jobs

on:
  workflow_dispatch:
  
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Job 1 Step 1
        run: |
          echo "This is Job 1"
          sleep 5
      
      - name: Job 1 Step 2
        run: echo "Job 1 complete!"

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: job2 step1
        run: |
          echo "This is job 2"
          sleep 5
  
  job3:
    runs-on: ubuntu-latest
    needs: [job1,job2]
    steps:
      - name: job3 step1
        run: echo "job3 running"

  
  job4:
    runs-on: ubuntu-latest
    needs: job3
    steps:
      - name: job4 step 1
        run: echo "Job 4 runs AFTER job3"
      
      - name: Final step
        run: echo "All jobs complete! "